name: ci

on:
  push:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: deps-${{ runner.os }}-${{ hashFiles('mise.toml', 'backend/Cargo.lock', 'frontend/package-lock.json') }}
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev
      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: true
          experimental: true
      - name: Install dependencies
        run: mise run setup
      - name: Check diff
        run: if [[ -n $(git diff --exit-code --name-only) ]]; then git diff --exit-code --name-only && exit 1; fi

  lint:
    needs: [prepare]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: deps-${{ runner.os }}-${{ hashFiles('mise.toml', 'backend/Cargo.lock', 'frontend/package-lock.json') }}
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev
      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: false
      - name: Install linters
        run: rustup component add rustfmt clippy
      - name: Run lint
        run: mise run lint

  test:
    needs: [prepare]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: deps-${{ runner.os }}-${{ hashFiles('mise.toml', 'backend/Cargo.lock', 'frontend/package-lock.json') }}
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev
      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: false
      - name: Run test
        run: mise run test

  build:
    needs: [prepare]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            frontend/node_modules
            ~/.cargo/registry
            ~/.cargo/git
          key: deps-${{ runner.os }}-${{ hashFiles('mise.toml', 'backend/Cargo.lock', 'frontend/package-lock.json') }}
      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev
      - uses: jdx/mise-action@v4
        with:
          version: 2026.3.10
          install: false
      - name: Run build
        run: mise run build
